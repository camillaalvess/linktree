<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camilla Vitória</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #06060f;
    --surface: #0d0d1f;
    --card: #111126;
    --border: rgba(120,100,255,0.15);
    --text: #f0eeff;
    --muted: #8880aa;
    --faint: #3a3560;
    --btn1-a: #d946b0;
    --btn1-b: #7c3aed;
    --btn2-a: #7c3aed;
    --btn2-b: #06b6d4;
    --btn3-a: #1e1b4b;
    --btn3-b: #5b21b6;
    --glow: rgba(124,58,237,0.35);
    --glow2: rgba(217,70,176,0.25);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ── Animated mesh background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(100,60,220,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(200,60,160,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 10%, rgba(60,80,200,0.1) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0.7; transform: scale(1.04); }
  }

  /* ── Page wrapper ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Nav ── */
  nav {
    display: flex;
    justify-content: flex-end;
    padding: 20px 40px;
    gap: 24px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--muted);
    opacity: 0;
    animation: fadeDown 0.6s 0.1s forwards;
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--text); }

  /* ── Hero ── */
  .hero {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 0;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 60px 60px;
  }

  /* ── Photo side ── */
  .photo-wrap {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .photo-frame {
    position: relative;
    width: 300px;
    height: 400px;
    border-radius: 18px;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border);
  }

  .photo-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(124,58,237,0.25) 0%, transparent 50%, rgba(217,70,176,0.15) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* placeholder when no image */
  .photo-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #1a1040 0%, #2d1b6e 60%, #0d1b4a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: rgba(160,130,255,0.2);
    letter-spacing: -4px;
    user-select: none;
  }

  /* glow halo behind frame */
  .photo-glow {
    position: absolute;
    width: 320px;
    height: 420px;
    border-radius: 20px;
    background: var(--glow);
    filter: blur(50px);
    z-index: -1;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    animation: glowPulse 4s ease-in-out infinite alternate;
  }

  @keyframes glowPulse {
    0%   { opacity: 0.5; transform: translateX(-50%) scale(0.95); }
    100% { opacity: 0.9; transform: translateX(-50%) scale(1.05); }
  }

  /* ── Content side ── */
  .content {
    padding-left: 60px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 4vw, 56px);
    font-weight: 800;
    color: #fff;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 6px;
  }

  /* ── Buttons ── */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 26px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s cubic-bezier(0.22,1,0.36,1), box-shadow 0.18s;
    width: fit-content;
    min-width: 240px;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    background: rgba(255,255,255,0.12);
    transition: opacity 0.2s;
  }

  .btn:hover { transform: translateY(-2px) scale(1.02); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: scale(0.98); }

  .btn-1 {
    background: linear-gradient(100deg, var(--btn1-a), var(--btn1-b));
    box-shadow: 0 4px 24px rgba(217,70,176,0.3);
  }
  .btn-1:hover { box-shadow: 0 8px 32px rgba(217,70,176,0.45); }

  .btn-2 {
    background: linear-gradient(100deg, var(--btn2-a), var(--btn2-b));
    box-shadow: 0 4px 24px rgba(6,182,212,0.25);
  }
  .btn-2:hover { box-shadow: 0 8px 32px rgba(6,182,212,0.4); }

  .btn-3 {
    background: linear-gradient(100deg, var(--btn3-a), var(--btn3-b));
    border: 1px solid rgba(139,92,246,0.4);
    box-shadow: 0 4px 24px rgba(91,33,182,0.3);
  }
  .btn-3:hover { box-shadow: 0 8px 32px rgba(91,33,182,0.45); }

  .btn-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    opacity: 0.9;
  }

  /* ── Tagline ── */
  .tagline {
    font-size: 15px;
    line-height: 1.65;
    max-width: 360px;
    color: #c4bbee;
  }

  .tagline em { font-style: italic; color: #a78bfa; }
  .tagline strong { font-weight: 500; color: #7c3aed; font-style: italic; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--faint);
    letter-spacing: 0.03em;
    opacity: 0;
    animation: fadeUp 0.5s 0.8s forwards;
  }

  footer a { color: inherit; text-decoration: none; }
  footer a:hover { color: var(--muted); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 720px) {
    nav { padding: 16px 24px; }

    .hero {
      grid-template-columns: 1fr;
      padding: 20px 24px 50px;
      text-align: center;
      gap: 32px;
    }

    .photo-wrap {
      justify-content: center;
      order: -1;
    }

    .photo-frame {
      width: 130px;
      height: 130px;
      border-radius: 50%;
    }

    .photo-placeholder {
      font-size: 42px;
      letter-spacing: -2px;
    }

    .photo-glow {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      filter: blur(30px);
    }

    .content {
      padding-left: 0;
      align-items: center;
    }

    .name { font-size: 32px; }

    .btn { min-width: 220px; justify-content: center; }

    .tagline { text-align: center; max-width: 300px; }
  }
</style>
</head>
<body>
<div class="page">

</div>

<script>
  /* Ripple effect on buttons */
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const ripple = document.createElement('span');
      Object.assign(ripple.style, {
        position: 'absolute',
        left: x + 'px', top: y + 'px',
        width: '6px', height: '6px',
        background: 'rgba(255,255,255,0.5)',
        borderRadius: '50%',
        transform: 'translate(-50%,-50%) scale(0)',
        animation: 'ripple 0.55s ease-out forwards',
        pointerEvents: 'none'
      });
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });

  /* Inject ripple keyframe */
  const style = document.createElement('style');
  style.textContent = `
    @keyframes ripple {
      to { transform: translate(-50%,-50%) scale(28); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>
